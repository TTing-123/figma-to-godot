<!DOCTYPE html>
<html>
<head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      color: #333;
      padding: 16px;
      background: #fff;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .logo {
      width: 24px;
      height: 24px;
      background: #7c3aed;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 14px;
    }

    h1 {
      font-size: 14px;
      font-weight: 600;
    }

    .description {
      color: #666;
      font-size: 12px;
      margin-bottom: 16px;
      line-height: 1.4;
    }

    .info-box {
      background: #f5f5f5;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
      font-size: 12px;
      color: #555;
    }

    .info-box strong {
      color: #333;
    }

    .progress-container {
      margin-bottom: 16px;
      display: none;
    }

    .progress-bar {
      height: 4px;
      background: #e0e0e0;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .progress-fill {
      height: 100%;
      background: #7c3aed;
      border-radius: 2px;
      transition: width 0.3s ease;
      width: 0%;
    }

    .progress-text {
      font-size: 12px;
      color: #666;
    }

    .error {
      color: #dc2626;
      font-size: 12px;
      margin-bottom: 12px;
      display: none;
    }

    .buttons {
      display: flex;
      gap: 8px;
    }

    button {
      flex: 1;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
    }

    .btn-primary {
      background: #7c3aed;
      color: white;
    }

    .btn-primary:hover {
      background: #6d28d9;
    }

    .btn-secondary {
      background: #f5f5f5;
      color: #333;
      border: 1px solid #ddd;
    }

    .btn-secondary:hover {
      background: #e8e8e8;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">G</div>
    <h1>Export for Godot</h1>
  </div>

  <div class="description">
    导出选中的 Figma 节点为 JSON + 图片资源，用于 Godot 导入。
  </div>

  <div class="info-box">
    <strong>使用方法：</strong><br>
    1. 在 Figma 中选中要导出的节点<br>
    2. 点击下方 "Export" 按钮<br>
    3. 保存生成的 JSON 文件<br>
    4. 在 Godot 中使用 Figma Importer 插件导入
  </div>

  <div class="error" id="error"></div>

  <div class="progress-container" id="progress">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-text" id="progressText">准备中...</div>
  </div>

  <div class="buttons">
    <button class="btn-secondary" id="cancelBtn">Cancel</button>
    <button class="btn-primary" id="exportBtn">Export</button>
  </div>

  <script>
    const exportBtn = document.getElementById('exportBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const errorEl = document.getElementById('error');
    const progressEl = document.getElementById('progress');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');

    exportBtn.addEventListener('click', () => {
      exportBtn.disabled = true;
      errorEl.style.display = 'none';
      progressEl.style.display = 'block';
      parent.postMessage({ pluginMessage: { type: 'export' } }, '*');
    });

    cancelBtn.addEventListener('click', () => {
      parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
    });

    // 监听插件消息
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;

      if (msg.type === 'progress') {
        progressFill.style.width = msg.percent + '%';
        progressText.textContent = msg.message;
      }

      if (msg.type === 'error') {
        errorEl.textContent = msg.message;
        errorEl.style.display = 'block';
        progressEl.style.display = 'none';
        exportBtn.disabled = false;
      }

      if (msg.type === 'download') {
        // 创建下载链接
        const blob = new Blob([msg.data], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = msg.filename || 'figma_export.json';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        // 完成后重新启用按钮
        setTimeout(() => {
          exportBtn.disabled = false;
          progressText.textContent = '导出完成！可以关闭此窗口。';
        }, 1000);
      }
    };
  </script>
</body>
</html>
